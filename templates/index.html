<!DOCTYPE html>
<html>

<head>

    <title>Smart Digital Lab Equipment Tracker</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f4;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        form {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 400px;
            margin-bottom: 30px;
            box-shadow: 0px 0px 10px lightgray;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            background-color: black;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th {
            background: black;
            color: white;
        }

        th, td {
            padding: 15px;
            border: 1px solid #ddd;
            text-align: center;
        }

        .low-stock {
            color: red;
            font-weight: bold;
        }

    </style>

</head>

<body>

    <h1>Smart Digital Lab Equipment Tracker</h1>

    <form action="/add" method="POST">

        <input
            type="text"
            name="name"
            placeholder="Equipment Name"
            required
        >

        <input
            type="text"
            name="category"
            placeholder="Category"
            required
        >

        <input
            type="number"
            name="quantity"
            placeholder="Quantity"
            required
        >

        <select name="status">

            <option>Available</option>
            <option>In Use</option>
            <option>Damaged</option>

        </select>

        <button type="submit">
            Add Equipment
        </button>

    </form>

    <table>

        <tr>
            <th>Name</th>
            <th>Category</th>
            <th>Quantity</th>
            <th>Status</th>
            <th>Alert</th>
        </tr>

        {% for item in equipment_list %}

        <tr>

            <td>{{ item.name }}</td>
            <td>{{ item.category }}</td>
            <td>{{ item.quantity }}</td>
            <td>{{ item.status }}</td>

            <td>

                {% if item.quantity < 3 %}

                    <span class="low-stock">
                        ⚠ Low Stock
                    </span>

                {% else %}

                    OK

                {% endif %}

            </td>

        </tr>

        {% endfor %}

    </table>

</body>

</html>
