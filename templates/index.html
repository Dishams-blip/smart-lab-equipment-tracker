<!DOCTYPE html>
<html>

<head>

    <title>Smart Digital Lab Equipment Tracker</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #dbeafe, #eff6ff);
        }

        h1{
            text-align: center;
            color: #1e3a8a;
            margin-top: 30px;
            font-size: 45px;
        }

        form{
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 450px;
            margin: 30px auto;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }

        input, select{
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
            box-sizing: border-box;
        }

        button{
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover{
            background: #1d4ed8;
        }

        table{
            width: 90%;
            margin: 30px auto;
            border-collapse: collapse;
            background: white;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        th{
            background: #111827;
            color: white;
            padding: 15px;
            font-size: 18px;
        }

        th, td{
            padding: 15px;
            border: 1px solid #ddd;
            text-align: center;
        }

        tr:hover{
            background: #f3f4f6;
        }

        .low-stock{
            color: red;
            font-weight: bold;
            font-size: 16px;
        }

        .ok-stock{
            color: green;
            font-weight: bold;
        }

    </style>

</head>

<body>

    <h1>Smart Digital Lab Equipment Tracker</h1>

    <form action="/add" method="POST">

        <input
            type="text"
            name="name"
            placeholder="Equipment Name"
            required
        >

        <input
            type="text"
            name="category"
            placeholder="Category"
            required
        >

        <input
            type="number"
            name="quantity"
            placeholder="Quantity"
            required
        >

        <select name="status">

            <option>Available</option>
            <option>In Use</option>
            <option>Damaged</option>

        </select>

        <button type="submit">
            Add Equipment
        </button>

    </form>

    <table>

        <tr>
            <th>Name</th>
            <th>Category</th>
            <th>Quantity</th>
            <th>Status</th>
            <th>Alert</th>
        </tr>

        {% for item in equipment_list %}

        <tr>

            <td>{{ item.name }}</td>
            <td>{{ item.category }}</td>
            <td>{{ item.quantity }}</td>
            <td>{{ item.status }}</td>

            <td>

                {% if item.quantity < 3 %}

                    <span class="low-stock">
                        ⚠ Low Stock
                    </span>

                {% else %}

                    <span class="ok-stock">
                        ✅ OK
                    </span>

                {% endif %}

            </td>

        </tr>

        {% endfor %}

    </table>

</body>

</html>
